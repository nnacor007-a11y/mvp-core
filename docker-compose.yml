services:
  db:
    image: postgres:16
    container_name: mvp_core_db
    environment:
      POSTGRES_DB: core
      POSTGRES_USER: core_user
      POSTGRES_PASSWORD: core_pass
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U core_user -d core"]
      interval: 2s
      timeout: 3s
      retries: 30
